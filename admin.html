<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Wellnessfy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --neon-teal: #00f5d4;
            --neon-turquoise: #00d2ff;
            --neon-purple: #7000ff;
            --navy-900: #020617;
            --navy-800: #0f172a;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--navy-900);
            color: white;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 100% 0%, rgba(0, 245, 212, 0.1) 0%, transparent 30%);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-upload {
            background: #475569;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-upload:hover {
            background: #64748b;
            transform: scale(1.05);
        }

        .table-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--navy-900);
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        .loader-sm {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-8">
    <header class="flex justify-between items-center mb-10 max-w-7xl mx-auto">
        <div class="flex items-center space-x-4">
            <img src="logo-white.png" alt="Wellnessfy" class="h-10" onerror="this.src='https://wellnessfy.io/wp-content/uploads/2023/06/Wellnessfy-Logo-White.png'">
            <div class="h-8 w-px bg-slate-700"></div>
            <h1 class="text-xl font-bold tracking-tight">Panel Administrativo <span class="text-teal-400">TotalPass</span></h1>
        </div>
        <div class="flex items-center space-x-2 text-slate-400 text-sm">
            <span class="material-symbols-outlined text-sm">admin_panel_settings</span>
            <span>Administrador</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="glass-card rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h2 class="font-semibold text-lg">Registros Recientes</h2>
                <div class="text-xs text-slate-400 uppercase tracking-widest">Wellnessfy Data Hub</div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-xs uppercase tracking-wider border-b border-white/5">
                            <th class="p-5 font-semibold">Nombre</th>
                            <th class="p-5 font-semibold">Email</th>
                            <th class="p-5 font-semibold">WhatsApp</th>
                            <th class="p-5 font-semibold">Fecha Nac.</th>
                            <th class="p-5 font-semibold">Carga de InBody</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="divide-y divide-white/5 text-sm">
                        <!-- Content will be loaded dynamically -->
                        <tr>
                            <td colspan="5" class="p-10 text-center text-slate-500">
                                <div class="flex flex-col items-center">
                                    <div class="loader-sm w-8 h-8 mb-4"></div>
                                    <span>Cargando registros...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Hidden input for file selection -->
    <input type="file" id="file-input" accept=".pdf" class="hidden">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configuración obtenida de tu panel de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDsjr4x49Xlk8TPV743FIo0Bq08-eb1lgk",
            authDomain: "wellnessfy-cbc1b.firebaseapp.com",
            projectId: "wellnessfy-cbc1b",
            storageBucket: "wellnessfy-cbc1b.firebasestorage.app",
            messagingSenderId: "232789372708",
            appId: "1:232789372708:web:81018234f737f7d46e0db1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Hacer globales para que los botones HTML directos puedan interactuar
        window.handleUploadClick = function(email) {
            window.currentUserEmail = email;
            document.getElementById('file-input').click();
        }
        window.currentUserEmail = null;

        // Escuchar datos en tiempo real de Firestore
        const q = query(collection(db, "totalpass_users"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('users-table-body');
            
            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-500">No hay registros aún.</td></tr>';
                return;
            }

            tbody.innerHTML = snapshot.docs.map(doc => {
                const user = doc.data();
                return `
                <tr class="table-row transition-colors">
                    <td class="p-5 font-medium">${user.name || ''} ${user.lastName || ''}</td>
                    <td class="p-5 text-slate-400">${user.email}</td>
                    <td class="p-5 text-slate-400">${user.whatsapp || ''}</td>
                    <td class="p-5 text-slate-400 font-mono">${user.birthDate || ''}</td>
                    <td class="p-5">
                        <button onclick="handleUploadClick('${user.email}')" 
                                class="btn-upload px-4 py-1.5 rounded-lg text-xs font-bold flex items-center space-x-2">
                            <span class="material-symbols-outlined text-sm">upload_file</span>
                            <span>CARGAR</span>
                        </button>
                    </td>
                </tr>
                `;
            }).join('');
        }, (error) => {
            console.error('Error fetching users:', error);
            document.getElementById('users-table-body').innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-400">Error al cargar datos. Verifica las reglas de lectura en Firestore.</td></tr>';
        });

        // Este listener maneja la selección del archivo y POST a TU COMPUTADORA LOCAL
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !window.currentUserEmail) return;

            const formData = new FormData();
            formData.append('inbody', file);

            // Change button state to loading
            const buttons = document.querySelectorAll(`button[onclick*="${window.currentUserEmail}"]`);
            const btn = buttons[0];
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="loader-sm"></div><span>ENVIANDO...</span>';
            btn.disabled = true;

            try {
                // Hacemos el envío al servidor LocalHost que tienes en tu Mac
                const response = await fetch(`http://localhost:3000/api/upload-inbody/${window.currentUserEmail}`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('Archivo InBody enviado exitosamente a ' + window.currentUserEmail);
                    btn.innerHTML = '<span class="material-symbols-outlined text-sm">check</span><span>ENVIADO</span>';
                    btn.classList.replace('btn-upload', 'bg-teal-500/20 text-teal-400');
                } else {
                    const result = await response.json();
                    alert('Error: ' + (result.error || 'No se pudo enviar el archivo.'));
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('No hay conexión local. ¡Asegúrate de que la terminal en tu Mac esté corriendo el comando "node server.js"!');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            } finally {
                document.getElementById('file-input').value = '';
                window.currentUserEmail = null;
            }
        });
    </script>
</body>
</html>
