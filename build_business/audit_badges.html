<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Auditoría de Insignias</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: monospace;
            padding: 40px;
        }

        h1 {
            color: #00f5d4;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            border: 1px solid #1e293b;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #1e293b;
            color: #94a3b8;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        tr:nth-child(even) {
            background-color: #1e293b50;
        }

        .ok {
            color: #00f5d4;
            font-weight: bold;
        }

        .fail {
            color: #f43f5e;
            font-weight: bold;
        }

        .neutral {
            color: #94a3b8;
        }

        #status {
            background: #1e293b;
            padding: 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
    </style>
</head>

<body>
    <h1>🕵️ Auditoría de Insignias Wellnessfy</h1>
    <div id="status">⏳ Conectando a Firestore...</div>

    <table id="results">
        <thead>
            <tr>
                <th>ID Documento</th>
                <th>Nombre</th>
                <th>Org ID</th>
                <th>Tipo</th>
                <th>Contenido</th>
                <th>Estilo Guardado</th>
                <th>Estado Integridad</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script type="module">
        import { db } from './src/config/firebaseInit.js';
        import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        async function audit() {
            const status = document.getElementById('status');
            const tbody = document.querySelector('#results tbody');

            try {
                status.innerText = "🔄 Descargando colección 'badges'...";
                const querySnapshot = await getDocs(collection(db, "badges"));

                if (querySnapshot.empty) {
                    status.innerText = "⚠️ La colección 'badges' está vacía.";
                    return;
                }

                status.innerText = `✅ Auditoría completada. Encontradas: ${querySnapshot.size} insignias.`;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    let styleStatus = "";
                    let integrityClass = "neutral";
                    let integrityMsg = "Estándar";

                    // Check Style Integrity
                    if (data.style) {
                        if (data.style.bgType === 'gradient') {
                            if (data.style.bgGradient) {
                                styleStatus = `Gradient (${data.style.bgGradient.angle}deg)`;
                                integrityClass = "ok";
                                integrityMsg = "✅ CORRECTO";
                            } else {
                                styleStatus = "Gradient (Data Missing)";
                                integrityClass = "fail";
                                integrityMsg = "❌ ROTO (Falta bgGradient)";
                            }
                        } else {
                            styleStatus = `Sólido (${data.style.bgSolid || 'N/A'})`;
                            integrityClass = "ok";
                            integrityMsg = "✅ CORRECTO";
                        }
                    } else {
                        styleStatus = "Sin Estilo";
                        integrityClass = "fail";
                        integrityMsg = "⚠️ Warning";
                    }

                    const contentDisplay = data.type === 'emoji'
                        ? `<span style="font-size:1.5em">${data.content || data.emoji || '?'}</span>`
                        : (data.content ? '(Imagen Base64)' : '(Sin contenido)');

                    const row = `
                        <tr>
                            <td style="color: #64748b; font-size: 0.8em">${doc.id}</td>
                            <td style="font-weight:bold">${data.name || 'Sin Nombre'}</td>
                            <td>${data.orgId || 'N/A'}</td>
                            <td>${data.type || 'N/A'}</td>
                            <td>${contentDisplay}</td>
                            <td>${styleStatus}</td>
                            <td class="${integrityClass}">${integrityMsg}</td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
            } catch (e) {
                console.error(e);
                status.innerText = "🚨 Error Crítico: " + e.message;
                status.style.color = "#f43f5e";
                status.style.borderColor = "#f43f5e";
            }
        }

        audit();
    </script>
</body>

</html>
