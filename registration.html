<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Wellnessfy | TotalPass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --neon-teal: #00f5d4;
            --neon-turquoise: #00d2ff;
            --neon-purple: #7000ff;
            --navy-900: #020617;
            --navy-800: #0f172a;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--navy-900);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 245, 212, 0.15) 0%, transparent 40%);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-input {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .neon-input:focus {
            border-color: var(--neon-teal);
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-teal), var(--neon-turquoise));
            color: var(--navy-900);
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.5);
        }

        .hidden-message {
            display: none;
        }

        /* Loading skeleton or spinner */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--neon-teal);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4">
    <div id="registration-form-container" class="glass-card w-full max-w-md p-8 rounded-2xl">
        <div class="text-center mb-8">
            <img src="logo-white.png" alt="Wellnessfy Logo" class="h-12 mx-auto mb-4" onerror="this.src='https://wellnessfy.io/wp-content/uploads/2023/06/Wellnessfy-Logo-White.png'">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-[#00f5d4] to-[#00d2ff]">Registro Wellnessfy</h1>
            <p class="text-slate-400 mt-2">Únete a la revolución del bienestar con TotalPass</p>
        </div>

        <form id="registration-form" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Nombre</label>
                <input type="text" id="name" required class="neon-input w-full p-3 rounded-lg text-white" placeholder="Tu nombre">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Apellido</label>
                <input type="text" id="lastName" required class="neon-input w-full p-3 rounded-lg text-white" placeholder="Tu apellido">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Email</label>
                <input type="email" id="email" required class="neon-input w-full p-3 rounded-lg text-white" placeholder="ejemplo@correo.com">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">WhatsApp</label>
                <input type="tel" id="whatsapp" required class="neon-input w-full p-3 rounded-lg text-white" placeholder="+52 ...">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Fecha de Nacimiento</label>
                <input type="date" id="birthDate" required class="neon-input w-full p-3 rounded-lg text-white">
            </div>
            
            <div class="flex items-start space-x-3 py-2">
                <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 rounded border-slate-700 bg-slate-800 focus:ring-teal-500 text-teal-500">
                <label for="terms" class="text-xs text-slate-400 leading-relaxed">
                    Acepto los <a href="https://wellnessfy.io/terminos-y-condiciones" target="_blank" class="text-teal-400 hover:underline">Términos y Condiciones</a> de Wellnessfy.
                </label>
            </div>

            <button type="submit" id="submit-btn" class="btn-primary w-full py-4 rounded-xl flex items-center justify-center space-x-2">
                <span>Enviar</span>
            </button>
        </form>
    </div>

    <div id="success-message" class="glass-card w-full max-w-md p-10 rounded-2xl text-center hidden-message">
        <div class="mb-6">
            <div class="w-16 h-16 bg-teal-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-teal-500/30">
                <span class="material-symbols-outlined text-teal-400 text-3xl">check_circle</span>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">¡Información Recibida!</h2>
            <p class="text-slate-400">Hemos recibido tu información correctamente. Pronto tendrás noticias nuestras.</p>
        </div>
        <div class="pt-6 border-t border-slate-700/50">
            <img src="logo-white.png" alt="Wellnessfy Logo" class="h-10 mx-auto opacity-80" onerror="this.src='https://wellnessfy.io/wp-content/uploads/2023/06/Wellnessfy-Logo-White.png'">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configuración obtenida de tu panel de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDsjr4x49Xlk8TPV743FIo0Bq08-eb1lgk",
            authDomain: "wellnessfy-cbc1b.firebaseapp.com",
            projectId: "wellnessfy-cbc1b",
            storageBucket: "wellnessfy-cbc1b.firebasestorage.app",
            messagingSenderId: "232789372708",
            appId: "1:232789372708:web:81018234f737f7d46e0db1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('registration-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="loader"></div>';
            btn.disabled = true;

            const data = {
                name: document.getElementById('name').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('whatsapp').value,
                birthDate: document.getElementById('birthDate').value,
                createdAt: serverTimestamp()
            };

            try {
                // Guardar en Firestore directamente de forma segura
                await addDoc(collection(db, "totalpass_users"), data);

                document.getElementById('registration-form-container').classList.add('hidden-message');
                document.getElementById('success-message').classList.remove('hidden-message');
            } catch (error) {
                console.error('Error al guardar en Firebase:', error);
                alert('Hubo un error al conectarse. Asegúrate de tener conexión y de que las Reglas de Firestore estén abiertas.');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
