<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitbit Authorization</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Conectando con Fitbit...</h1>
        <p>Por favor espera mientras completamos la autorización.</p>
    </div>

    <script>
        // Función para parsear el hash fragment
        function getHashParams() {
            const hash = window.location.hash.substring(1);
            const params = {};
            hash.split('&').forEach(part => {
                const [key, value] = part.split('=');
                if (key && value) params[key] = decodeURIComponent(value);
            });
            return params;
        }

        // Obtener parámetros
        const params = getHashParams();
        const accessToken = params.access_token;
        const userId = params.user_id;
        const state = params.state;
        const error = params.error || new URLSearchParams(window.location.search).get('error');

        if (error) {
            document.querySelector('.container').innerHTML = `
                <h1>❌ Error de Autorización</h1>
                <p>No se pudo conectar con Fitbit: ${error}</p>
                <p>Puedes cerrar esta ventana.</p>
            `;
        } else if (accessToken) {
            const authData = {
                type: 'FITBIT_AUTH_SUCCESS',
                token: accessToken,
                userId: userId,
                state: state,
                timestamp: Date.now()
            };

            // Intento 1: postMessage directo (Rápido y limpio)
            let sentViaOpener = false;
            if (window.opener) {
                try {
                    window.opener.postMessage(authData, '*');
                    sentViaOpener = true;
                } catch (e) {
                    console.warn('Error enviando postMessage:', e);
                }
            }

            // Intento 2: LocalStorage (Respaldo robusto si opener falla)
            // Escribimos el resultado para que la ventana principal lo detecte via evento 'storage'
            localStorage.setItem('fitbit_pending_auth', JSON.stringify(authData));

            document.querySelector('.container').innerHTML = `
                <h1>✅ Autorización Exitosa</h1>
                <p>Tokens recibidos correctamente.</p>
                <p>Cerrando ventana segura...</p>
            `;

            // Cerrar siempre, nunca redirigir a la app aquí
            setTimeout(() => window.close(), 1000);

        } else {
            document.querySelector('.container').innerHTML = `
                <h1>⚠️ Parámetros Inválidos</h1>
                <p>No se recibió el token de acceso.</p>
                <p>URL Hash: ${window.location.hash}</p>
            `;
        }
    </script>
</body>

</html>
