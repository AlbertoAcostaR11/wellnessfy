<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Wellnessfy - Login & Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00f5d4",
                        "secondary": "#00d2ff",
                        "navy-900": "#020617",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        /* Gradiente dinámico de fondo */
        .dynamic-gradient {
            background: radial-gradient(circle at 0% 0%, #00f2fe 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #7000ff 0%, transparent 50%),
                #050505;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Elementos decorativos animados */
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00f5d4 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #00d2ff 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #7000ff 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* Tarjeta de login con glassmorphism */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Texto con gradiente */
        .gradient-text {
            /* Gradiente diagonal: Top-Left (Cyan Verdoso) -> Bottom-Right (Cyan Azulado) */
            background: linear-gradient(135deg, #00f5d4 0%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }

        /* Logo con glow effect */
        .logo-glow {
            box-shadow: 0 0 40px rgba(0, 245, 212, 0.6),
                0 0 80px rgba(0, 245, 212, 0.3);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 40px rgba(0, 245, 212, 0.6), 0 0 80px rgba(0, 245, 212, 0.3);
            }

            50% {
                box-shadow: 0 0 60px rgba(0, 245, 212, 0.8), 0 0 120px rgba(0, 245, 212, 0.4);
            }
        }
    </style>
</head>

<body class="font-display text-white">
    <div class="dynamic-gradient flex items-center justify-center p-6">
        <!-- Orbes decorativos animados -->
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>

        <!-- Tarjeta de login centralizada -->
        <div class="login-card w-full max-w-md p-8 md:p-10 relative z-10">
            <!-- Logo -->
            <div class="flex flex-col items-center mb-6">
                <img src="logo-white.png" alt="Wellnessfy"
                    class="h-16 w-auto object-contain drop-shadow-[0_0_15px_rgba(0,245,212,0.3)]">
            </div>

            <!-- Headline -->
            <div class="text-center mb-8">
                <h2 class="text-2xl md:text-3xl font-extrabold leading-tight mb-3 gradient-text">
                    Start Your <br />
                    Wellness Journey
                </h2>
                <p class="text-gray-400 text-sm">
                    The social network for holistic living, mindful movement, and healthy habits.
                </p>
            </div>

            <!-- Social Login Buttons -->
            <div class="space-y-3">
                <!-- Google Sign-In Button -->
                <button onclick="handleSocialLogin('google')"
                    class="w-full h-12 bg-white rounded-xl flex items-center justify-center gap-3 transition-all hover:bg-gray-50 active:scale-[0.98] shadow-sm">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z">
                        </path>
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z">
                        </path>
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z">
                        </path>
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z">
                        </path>
                    </svg>
                    <span class="text-gray-700 font-medium text-sm">Sign in with Google</span>
                </button>

                <!-- Apple Sign-In Button -->
                <button onclick="handleSocialLogin('apple')"
                    class="w-full h-12 bg-white text-black rounded-xl font-semibold text-base flex items-center justify-center gap-2 transition-all hover:bg-gray-100 active:scale-[0.98] shadow-sm">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path
                            d="M15.4 8.9c-.1 2.4 2.1 3.2 2.2 3.2-.1.2-.3 1.2-1.1 2.3-.7 1-1.4 2-2.5 2-1.1.1-1.4-.6-2.7-.6-1.2 0-1.6.6-2.6.7-1 .1-1.9-1.1-2.6-2.1-1.5-2.1-2.6-6-1.1-8.6.7-1.3 2.1-2.1 3.5-2.1 1.1 0 2 .7 2.7.7.7 0 1.9-.9 3.2-.7.5 0 2 .2 2.9 1.6-.1 0-1.7 1-1.7 3 0 0-.1.1-.2.6zm-2.8-8.4c.6-.7 1-1.7.9-2.7-.9 0-1.9.6-2.5 1.3-.6.7-1.1 1.7-1 2.7 1 .1 2-.5 2.6-1.3z" />
                    </svg>
                    <span>Sign in with Apple</span>
                </button>


            </div>

            <!-- Footer Links -->
            <div class="mt-8 text-center">
                <p class="text-gray-500 text-xs leading-relaxed">
                    By joining Wellnessfy, you agree to our <br />
                    <a class="text-primary hover:underline" href="#">Terms of Service</a> and
                    <a class="text-primary hover:underline" href="#">Privacy Policy</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase configuration
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC9K_nqcTRPGtTpUfWDvkFhnAESaJ3I7Vs",
            authDomain: "wellnessfy-cbc1b.firebaseapp.com",
            projectId: "wellnessfy-cbc1b",
            storageBucket: "wellnessfy-cbc1b.firebasestorage.app",
            messagingSenderId: "232789372708",
            appId: "1:232789372708:web:e7d5fcffa0ba39cf6e0db1",
            measurementId: "G-0V7MV5E1CF"
        };

        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, GoogleAuthProvider, OAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Check if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('wellnessfy_logged_in', 'true');
                localStorage.setItem('wellnessfy_user_id', user.uid);
                window.location.href = 'index.html';
            }
        });

        // Social login handler
        window.handleSocialLogin = async function (provider) {
            if (provider === 'google') {
                await signInWithGoogle();
            } else if (provider === 'apple') {
                await signInWithApple();
            } else {
                showToast(`${provider.charAt(0).toUpperCase() + provider.slice(1)} Sign-In coming soon!`);
            }
        };

        async function signInWithGoogle() {
            try {
                showToast('Iniciando sesión con Google...');

                const provider = new GoogleAuthProvider();
                provider.addScope('profile');
                provider.addScope('email');

                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                console.log('✅ Google Sign-In successful:', user.displayName);

                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                let userData;

                if (userDocSnap.exists()) {
                    // User already exists in DB - Load data
                    userData = userDocSnap.data();
                    console.log('User found in database, logging in...');
                    localStorage.setItem('wellnessfy_is_new_user', 'false');
                } else {
                    // New user - Create in DB with empty defaults
                    console.log('New user, creating database entry...');
                    userData = {
                        id: user.uid,
                        name: user.displayName || 'Usuario',
                        username: '@' + (user.email?.split('@')[0] || 'user'),
                        email: user.email,
                        avatar: user.photoURL || 'https://i.pravatar.cc/300?img=12',
                        bio: '¡Hola! Soy nuevo en Wellnessfy 🌱',
                        isPublic: true,
                        interests: [],
                        // Explicitly empty for new users as requested
                        challenges: [],
                        circles: [],
                        feedPosts: [],
                        stats: { steps: 0, activeMinutes: 0, sleepHours: 0, calories: 0, heartRate: 0 },
                        goals: { steps: 10000, activeMinutes: 60, sleepHours: 8 },
                        averages: { steps: 0, activeMinutes: 0, sleepHours: 0 },
                        badges: []
                    };

                    // Save to Firestore
                    await setDoc(userDocRef, userData);
                    localStorage.setItem('wellnessfy_is_new_user', 'true');
                }

                localStorage.setItem('wellnessfy_user', JSON.stringify(userData));
                localStorage.setItem('wellnessfy_user_id', user.uid);
                localStorage.setItem('wellnessfy_user_email', user.email);
                localStorage.setItem('wellnessfy_logged_in', 'true');

                showToast('¡Bienvenido a Wellnessfy!', 'success');
                setTimeout(() => window.location.href = 'index.html', 1000);

            } catch (error) {
                console.error('❌ Error during Google Sign-In:', error);
                let errorMessage = 'Error al iniciar sesión con Google';
                if (error.code === 'auth/popup-closed-by-user') errorMessage = 'Inicio de sesión cancelado';
                else if (error.code === 'auth/popup-blocked') errorMessage = 'Permite las ventanas emergentes';
                else if (error.code === 'auth/network-request-failed') errorMessage = 'Error de conexión';
                showToast(errorMessage, 'error');
            }
        }

        async function signInWithApple() {
            try {
                showToast('Iniciando sesión con Apple...');

                const provider = new OAuthProvider('apple.com');
                provider.addScope('email');
                provider.addScope('name');

                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                console.log('✅ Apple Sign-In successful:', user.displayName || user.email);

                const additionalUserInfo = result._tokenResponse;
                let displayName = user.displayName;
                if (!displayName && additionalUserInfo?.firstName) {
                    displayName = `${additionalUserInfo.firstName} ${additionalUserInfo.lastName || ''}`.trim();
                }

                const userData = {
                    id: user.uid,
                    name: displayName || user.email?.split('@')[0] || 'Usuario',
                    username: '@' + (user.email?.split('@')[0] || 'user'),
                    email: user.email,
                    avatar: user.photoURL || 'https://i.pravatar.cc/300?img=12',
                    bio: '¡Hola! Soy nuevo en Wellnessfy 🌱',
                    isPublic: true,
                    interests: [],
                    activities: [],
                    stats: { steps: 0, activeMinutes: 0, sleepHours: 0, calories: 0, heartRate: 72 },
                    goals: { steps: 10000, activeMinutes: 60, sleepHours: 8 },
                    averages: { steps: 0, activeMinutes: 0, sleepHours: 0 },
                    badges: []
                };

                localStorage.setItem('wellnessfy_user', JSON.stringify(userData));
                localStorage.setItem('wellnessfy_user_id', user.uid);
                localStorage.setItem('wellnessfy_user_email', user.email);
                localStorage.setItem('wellnessfy_logged_in', 'true');
                localStorage.setItem('wellnessfy_is_new_user', 'true');

                showToast('¡Bienvenido a Wellnessfy!', 'success');
                setTimeout(() => window.location.href = 'index.html', 1000);

            } catch (error) {
                console.error('❌ Error during Apple Sign-In:', error);
                let errorMessage = 'Error al iniciar sesión con Apple';
                if (error.code === 'auth/popup-closed-by-user') errorMessage = 'Inicio de sesión cancelado';
                else if (error.code === 'auth/popup-blocked') errorMessage = 'Permite las ventanas emergentes';
                else if (error.code === 'auth/network-request-failed') errorMessage = 'Error de conexión';
                else if (error.code === 'auth/operation-not-allowed') errorMessage = 'Apple Sign-In no está habilitado en Firebase';
                showToast(errorMessage, 'error');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-primary/20 border-primary/40' :
                type === 'error' ? 'bg-red-500/20 border-red-500/40' :
                    'bg-white/10 border-white/20';

            toast.className = `fixed top-20 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-xl login-card border ${bgColor} text-white text-sm font-semibold shadow-lg transition-all duration-300`;
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(-20px)';
            toast.textContent = message;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateX(-50%) translateY(0)';
            }, 10);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>

</html>
