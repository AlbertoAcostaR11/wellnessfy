<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellnessfy - El Ecosistema de tu Bienestar</title>
    <style>
        body {
            background-color: #020617;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .highlight {
            color: #00f5d4;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 600px;
        }

        .btn {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: #00f5d4;
            color: #020617;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <h1>Wellnessfy<span class="highlight">.io</span></h1>
    <p>La plataforma integral que unifica tu actividad física, bienestar mental y nutrición.</p>
    <p>Próximamente disponible.</p>
    <a href="https://app.wellnessfy.io" class="btn">Ir a la App</a>
</body>

</html>
